# 打 tag 时自动构建 macOS + Windows 并发布到 GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install trunk
        run: cargo install trunk --locked

      - name: Download Typst sidecar (Unix)
        if: runner.os != 'Windows'
        run: ./scripts/download-typst.sh

      - name: Download Typst sidecar (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          TYPST_VER="0.15.0"
          TARGET="x86_64-pc-windows-msvc"
          mkdir -p src-tauri/binaries
          # Windows 用 zip 格式（runner 没装 xz）
          curl -sSL -o /tmp/typst.zip "https://github.com/typst/typst/releases/download/v${TYPST_VER}/typst-${TARGET}.zip"
          unzip -o /tmp/typst.zip -d /tmp > /dev/null
          cp "/tmp/typst-${TARGET}/typst.exe" "src-tauri/binaries/typst-${TARGET}.exe"
          chmod +x "src-tauri/binaries/typst-${TARGET}.exe"

      - name: Build frontend
        run: trunk build

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DailyPlan ${{ github.ref_name }}"
          releaseBody: |
            ## DailyPlan 每日计划表

            本地桌面应用：录入任务、绑定时段、生成打卡表、打印检查。

            ### 下载
            - **Apple Silicon (M1/M2/M3)**: `DailyPlan_*_aarch64.dmg`
            - **Intel Mac**: `DailyPlan_*_x64.dmg`
            - **Windows 11**: `DailyPlan_*_x64-setup.exe` 或 `DailyPlan_*_x64_en-US.msi`

            ### 安装
            **macOS**: 下载 .dmg → 拖到 Applications → 右键打开（绕过 Gatekeeper）
            **Windows**: 下载 .exe/.msi → 双击安装

            ### 中文字体
            macOS 使用系统 PingFang SC，Windows 使用系统微软雅黑，无需额外安装字体。
          releaseDraft: false
          prerelease: false
